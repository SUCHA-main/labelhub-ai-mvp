services:
  backend:
    build:
      context: ./backend
    container_name: labelhub-ai-backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=4000

  frontend:
    build:
      context: ./frontend
    container_name: labelhub-ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
